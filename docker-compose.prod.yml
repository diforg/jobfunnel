services:
  php:
    build:
      context: .
      dockerfile: Dockerfile.php
      args:
        APP_ENV: production
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-jobfunnel}
      - DB_USERNAME=${DB_USERNAME:-jobfunnel}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  node:
    profiles: ["dev"]

  adminer:
    profiles: ["dev"]
